<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Posture Dashboard - CyberProbe</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-hover: #292e36;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --accent-red: #f85149;
            --accent-orange: #d29922;
            --accent-yellow: #e3b341;
            --accent-green: #3fb950;
            --accent-purple: #a371f7;
            --accent-cyan: #39d2c0;
        }
        :root[data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaeef2;
            --bg-hover: #d0d7de;
            --border-color: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #424a53;
            --text-muted: #656d76;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.45;
            margin: 0;
            padding: 0;
            width: 100vw;
            overflow-x: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            width: 100%;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .header .date {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            flex-shrink: 0;
            overflow-x: auto;
        }
        .tab {
            padding: 5px 10px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .tab-panel { display: none; padding: 8px 8px; }
        .tab-panel.active { display: block; }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 6px;
            margin-bottom: 8px;
        }
        .kpi {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 7px 6px;
            text-align: center;
        }
        .kpi-val {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.1;
        }
        .kpi-lbl {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge-critical { background: rgba(248,81,73,0.15); color: var(--accent-red); border: 1px solid rgba(248,81,73,0.35); }
        .badge-high { background: rgba(210,153,34,0.15); color: var(--accent-orange); border: 1px solid rgba(210,153,34,0.35); }
        .badge-medium { background: rgba(227,179,65,0.15); color: var(--accent-yellow); border: 1px solid rgba(227,179,65,0.35); }
        .badge-low { background: rgba(63,185,80,0.15); color: var(--accent-green); border: 1px solid rgba(63,185,80,0.35); }
        .badge-active { background: rgba(63,185,80,0.15); color: var(--accent-green); border: 1px solid rgba(63,185,80,0.35); }
        .badge-inactive { background: rgba(248,81,73,0.15); color: var(--accent-red); border: 1px solid rgba(248,81,73,0.35); }
        .badge-choke { background: rgba(163,113,247,0.18); color: var(--accent-purple); border: 1px solid rgba(163,113,247,0.45); font-weight: 700; }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        thead th {
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            text-align: left;
            padding: 4px 5px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 1;
            font-size: 10px;
        }
        thead th:hover { color: var(--accent-cyan); }
        tbody td { padding: 4px 5px; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
        tbody tr { transition: background 0.1s; cursor: pointer; }
        tbody tr:hover { background: rgba(88,166,255,0.06); }
        tbody tr.highlight { background: rgba(248,81,73,0.05); }

        /* Search */
        .search-box {
            width: 100%;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-primary);
            font-size: 11px;
            outline: none;
            margin-bottom: 6px;
        }
        .search-box:focus { border-color: var(--accent-blue); }
        .search-box::placeholder { color: var(--text-muted); }

        /* Filter row */
        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 3px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .filter-btn.active { background: rgba(88,166,255,0.12); border-color: var(--accent-blue); color: var(--accent-blue); }

        /* Stacked bar */
        .stacked-bar {
            display: flex;
            height: 18px;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }
        .stacked-bar > div { transition: width 0.6s ease-out; }

        /* Info card */
        .info-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 7px 8px;
            margin-bottom: 6px;
        }
        .info-card.critical { border-left: 3px solid var(--accent-red); }
        .info-card.warning { border-left: 3px solid var(--accent-orange); }
        .info-card.info { border-left: 3px solid var(--accent-blue); }
        .info-card h3 { font-size: 13px; margin-bottom: 4px; }
        .info-card p { font-size: 12px; color: var(--text-muted); }

        /* Detail row */
        .detail-grid {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 1px 6px;
            font-size: 11px;
        }
        .detail-grid .label { color: var(--text-muted); }
        .detail-grid .val { color: var(--text-primary); font-weight: 500; }

        /* MITRE card */
        .mitre-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .mitre-card:hover { border-color: var(--accent-purple); }
        .mitre-id { color: var(--accent-purple); font-weight: 700; font-size: 11px; }
        .mitre-name { font-weight: 600; font-size: 12px; }
        .mitre-ev { color: var(--text-muted); font-size: 11px; }

        /* Recommendation */
        .rec {
            display: flex;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .rec:hover { border-color: var(--accent-blue); }
        .rec.done { opacity: 0.45; text-decoration: line-through; }
        .rec-badge {
            flex-shrink: 0;
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700;
        }
        .rec-p1 { border-color: var(--accent-red); color: var(--accent-red); }
        .rec-p2 { border-color: var(--accent-orange); color: var(--accent-orange); }
        .rec-p3 { border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .rec.done .rec-badge { background: var(--accent-green); border-color: var(--accent-green); color: #000; }
        .rec-content { flex: 1; }
        .rec-content strong { font-size: 12px; display: block; }
        .rec-content p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* Progress bar */
        .progress-bar { height: 6px; border-radius: 3px; background: var(--bg-tertiary); overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease-out; }

        /* Cost cards */
        .cost-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .cost-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 7px 8px;
        }
        .cost-val { font-size: 16px; font-weight: 700; color: var(--accent-blue); }
        .cost-lbl { font-size: 10px; color: var(--text-muted); }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            flex-direction: column;
            gap: 10px;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            padding: 4px 8px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 10px;
            color: var(--text-muted);
        }
        .footer-btn {
            padding: 3px 10px;
            background: var(--accent-blue);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        .footer-btn:hover { opacity: 0.9; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        /* Fullscreen mode — expand everything */
        body.fullscreen .container { max-height: none; height: 100vh; }
        body.fullscreen .header { padding: 10px 16px; }
        body.fullscreen .header h1 { font-size: 16px; }
        body.fullscreen .tab { padding: 8px 16px; font-size: 13px; }
        body.fullscreen .tab-panel { padding: 14px 18px; }
        body.fullscreen .kpi-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        body.fullscreen .kpi { padding: 12px; }
        body.fullscreen .kpi-val { font-size: 24px; }
        body.fullscreen .kpi-lbl { font-size: 11px; }
        body.fullscreen table { font-size: 13px; }
        body.fullscreen thead th { padding: 8px 10px; font-size: 12px; }
        body.fullscreen tbody td { padding: 7px 10px; }
        body.fullscreen .info-card { padding: 12px 16px; }
        body.fullscreen .info-card h3 { font-size: 15px; }
        body.fullscreen .detail-grid { grid-template-columns: 160px 1fr; font-size: 13px; gap: 3px 12px; }
        body.fullscreen .search-box { padding: 8px 12px; font-size: 13px; }
        body.fullscreen .mitre-card { padding: 10px 14px; }
        body.fullscreen .mitre-name { font-size: 14px; }
        body.fullscreen .rec { padding: 10px 14px; }
        body.fullscreen .rec-content strong { font-size: 14px; }
        body.fullscreen .rec-content p { font-size: 12px; }
        body.fullscreen .cost-val { font-size: 22px; }
        body.fullscreen .cost-lbl { font-size: 12px; }
        body.fullscreen .footer { padding: 6px 16px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛡️ <span id="title">Security Posture Dashboard</span></h1>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="date" id="reportDate">Loading...</span>
                <button id="fullscreenBtn" title="Fullscreen" style="background:none;border:1px solid var(--border-color);border-radius:4px;color:var(--text-muted);cursor:pointer;font-size:14px;padding:2px 6px;line-height:1;">⊞</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar" id="tabBar">
            <div class="tab active" data-tab="overview">Overview</div>
            <div class="tab" data-tab="av">AV Compliance</div>
            <div class="tab" data-tab="exposure">Exposure</div>
            <div class="tab" data-tab="attacks">Attack Paths</div>
            <div class="tab" data-tab="recs">Recommendations</div>
        </div>

        <!-- Content -->
        <div class="content" id="content">
            <!-- Loading state -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>Waiting for posture data...</span>
            </div>

            <!-- OVERVIEW TAB -->
            <div class="tab-panel active" id="panel-overview" style="display:none;">
                <div class="kpi-grid" id="kpiGrid"></div>
                <div class="info-card critical" id="topRiskCard" style="display:none;"></div>
                <div class="info-card warning" id="blindSpotCard" style="display:none;"></div>
                <div id="cspmBar"></div>
            </div>

            <!-- AV COMPLIANCE TAB -->
            <div class="tab-panel" id="panel-av" style="display:none;">
                <div id="avSummary"></div>
                <div id="avBar" style="margin-bottom:8px;"></div>
                <input class="search-box" type="text" id="avSearch" placeholder="🔍 Search devices...">
                <div class="filters" id="avFilters"></div>
                <div style="overflow-x:auto;max-height:60vh;overflow-y:auto;">
                    <table id="avTable"><thead></thead><tbody></tbody></table>
                </div>
            </div>

            <!-- EXPOSURE TAB -->
            <div class="tab-panel" id="panel-exposure" style="display:none;">
                <input class="search-box" type="text" id="expSearch" placeholder="🔍 Search devices...">
                <div style="overflow-x:auto;max-height:65vh;overflow-y:auto;">
                    <table id="expTable"><thead></thead><tbody></tbody></table>
                </div>
            </div>

            <!-- ATTACK PATHS TAB -->
            <div class="tab-panel" id="panel-attacks" style="display:none;">
                <div id="attackKpis"></div>
                <div id="chokePoints"></div>
                <div id="mitreCards" style="margin-top:10px;"></div>
            </div>

            <!-- RECOMMENDATIONS TAB -->
            <div class="tab-panel" id="panel-recs" style="display:none;">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;" id="recStatus">Click to mark as done</div>
                <div id="recList"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span id="footerStatus">Ready</span>
            <button class="footer-btn" id="openReportBtn" style="display:none;">Open Full Report ↗</button>
        </div>
    </div>

    <script type="module" src="./src/app/security-posture.ts"></script>
</body>
</html>
