<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entity Explorer - CyberProbe</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-hover: #30363d;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --accent-red: #f85149;
            --accent-orange: #d29922;
            --accent-yellow: #e3b341;
            --accent-green: #3fb950;
            --accent-purple: #a371f7;
        }
        
        :root[data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaeef2;
            --bg-hover: #d0d7de;
            --border-color: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #424a53;
            --text-muted: #656d76;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 500px;
        }
        
        /* Header with filters */
        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 6px 12px 6px 32px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 12px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
        }
        
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0.6;
        }
        
        .filter-chips {
            display: flex;
            gap: 6px;
        }
        
        .chip {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .chip:hover { background: var(--bg-hover); }
        .chip.active { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
        .chip .count { opacity: 0.7; }
        
        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .stat-dot.critical { background: var(--accent-red); }
        .stat-dot.high { background: var(--accent-orange); }
        .stat-dot.medium { background: var(--accent-yellow); }
        .stat-dot.low { background: var(--accent-green); }
        .stat-dot.info { background: var(--accent-blue); }
        
        /* Entity list */
        .entity-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .entity-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        
        .entity-card:hover {
            border-color: var(--accent-blue);
        }
        
        .entity-card.critical { border-left: 3px solid var(--accent-red); }
        .entity-card.high { border-left: 3px solid var(--accent-orange); }
        .entity-card.medium { border-left: 3px solid var(--accent-yellow); }
        .entity-card.low { border-left: 3px solid var(--accent-green); }
        .entity-card.info { border-left: 3px solid var(--accent-blue); }
        
        .entity-header {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        
        .entity-icon {
            width: 32px;
            height: 32px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .entity-main {
            flex: 1;
            min-width: 0;
        }
        
        .entity-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .entity-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .entity-badges {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .badge.ip { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); }
        .badge.user { background: rgba(163, 113, 247, 0.15); color: var(--accent-purple); }
        .badge.device { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
        .badge.domain { background: rgba(210, 153, 34, 0.15); color: var(--accent-orange); }
        .badge.email { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }
        .badge.file { background: rgba(139, 148, 158, 0.15); color: var(--text-muted); }
        .badge.vpn { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }
        .badge.clean { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
        
        .expand-icon {
            color: var(--text-muted);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        
        .entity-card.expanded .expand-icon {
            transform: rotate(90deg);
        }
        
        /* Entity details (expandable) */
        .entity-details {
            display: none;
            padding: 0 12px 12px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-primary);
        }
        
        .entity-card.expanded .entity-details {
            display: block;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            padding-top: 10px;
        }
        
        .detail-item {
            background: var(--bg-secondary);
            padding: 8px 10px;
            border-radius: 4px;
        }
        
        .detail-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        
        .detail-value {
            font-size: 12px;
            color: var(--text-primary);
            word-break: break-all;
        }
        
        .detail-value.copyable {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .detail-value.copyable:hover {
            color: var(--accent-blue);
        }
        
        .detail-value.copyable::after {
            content: '📋';
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .detail-value.copyable:hover::after {
            opacity: 1;
        }
        
        /* Actions */
        .entity-actions {
            display: flex;
            gap: 6px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
        }
        
        .action-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .action-btn.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .action-btn.primary:hover {
            background: #4c9aed;
        }
        
        /* Loading state */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 8px;
            opacity: 0.5;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔎 Entity Explorer</h1>
            <div class="search-box">
                <input type="text" id="search" placeholder="Search entities...">
            </div>
            <div class="filter-chips" id="filter-chips">
                <!-- Dynamically populated -->
            </div>
        </div>
        
        <div class="stats-bar" id="stats-bar">
            <!-- Dynamically populated -->
        </div>
        
        <div class="entity-list" id="entity-list">
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 12px;">Loading entities...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { App } from '@modelcontextprotocol/ext-apps';
        
        const app = new App({
            name: 'CyberProbe Entity Explorer',
            version: '1.0.0',
        });
        
        // State
        let entities = [];
        let activeFilters = new Set();
        let searchQuery = '';
        
        // DOM elements
        const loadingEl = document.getElementById('loading');
        const entityListEl = document.getElementById('entity-list');
        const filterChipsEl = document.getElementById('filter-chips');
        const statsBarEl = document.getElementById('stats-bar');
        const searchEl = document.getElementById('search');
        
        // Entity type icons
        const typeIcons = {
            ip: '🌐',
            user: '👤',
            device: '💻',
            domain: '🔗',
            email: '📧',
            file: '📄',
            hash: '🔐',
            url: '🌍',
            process: '⚙️',
            alert: '⚠️'
        };
        
        // Handle theme
        app.onthemechange = (theme) => {
            document.documentElement.setAttribute('data-theme', theme.mode);
        };
        
        // Handle tool result data
        app.ontoolresult = (result) => {
            console.log('Received entities:', result);
            
            const data = result._meta?.entities || result.entities || [];
            entities = Array.isArray(data) ? data : [];
            
            loadingEl.style.display = 'none';
            
            if (entities.length === 0) {
                entityListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No entities to display</p>
                    </div>
                `;
                return;
            }
            
            renderFilters();
            renderStats();
            renderEntities();
        };
        
        // Search handler
        searchEl.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderEntities();
        });
        
        // Render filter chips
        function renderFilters() {
            const typeCounts = {};
            entities.forEach(e => {
                typeCounts[e.type] = (typeCounts[e.type] || 0) + 1;
            });
            
            filterChipsEl.innerHTML = Object.entries(typeCounts)
                .sort((a, b) => b[1] - a[1])
                .map(([type, count]) => `
                    <div class="chip ${activeFilters.has(type) ? 'active' : ''}" data-type="${type}">
                        ${typeIcons[type] || '📌'} ${type} <span class="count">(${count})</span>
                    </div>
                `).join('');
            
            // Add click handlers
            filterChipsEl.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const type = chip.dataset.type;
                    if (activeFilters.has(type)) {
                        activeFilters.delete(type);
                    } else {
                        activeFilters.add(type);
                    }
                    chip.classList.toggle('active');
                    renderEntities();
                });
            });
        }
        
        // Render stats bar
        function renderStats() {
            const severityCounts = {
                critical: 0,
                high: 0,
                medium: 0,
                low: 0,
                info: 0
            };
            
            entities.forEach(e => {
                const sev = e.severity || 'info';
                if (severityCounts.hasOwnProperty(sev)) {
                    severityCounts[sev]++;
                }
            });
            
            statsBarEl.innerHTML = `
                <div class="stat">
                    <span class="stat-dot critical"></span>
                    <span>Critical: ${severityCounts.critical}</span>
                </div>
                <div class="stat">
                    <span class="stat-dot high"></span>
                    <span>High: ${severityCounts.high}</span>
                </div>
                <div class="stat">
                    <span class="stat-dot medium"></span>
                    <span>Medium: ${severityCounts.medium}</span>
                </div>
                <div class="stat">
                    <span class="stat-dot low"></span>
                    <span>Low: ${severityCounts.low}</span>
                </div>
                <div class="stat">
                    <span class="stat-dot info"></span>
                    <span>Info: ${severityCounts.info}</span>
                </div>
                <div class="stat" style="margin-left: auto; color: var(--text-muted);">
                    Total: ${entities.length}
                </div>
            `;
        }
        
        // Render entity cards
        function renderEntities() {
            let filtered = entities;
            
            // Apply type filters
            if (activeFilters.size > 0) {
                filtered = filtered.filter(e => activeFilters.has(e.type));
            }
            
            // Apply search
            if (searchQuery) {
                filtered = filtered.filter(e => {
                    const searchable = [
                        e.value,
                        e.name,
                        e.type,
                        e.description,
                        ...(e.tags || [])
                    ].filter(Boolean).join(' ').toLowerCase();
                    return searchable.includes(searchQuery);
                });
            }
            
            // Sort by severity
            const severityOrder = { critical: 0, high: 1, medium: 2, low: 3, info: 4 };
            filtered.sort((a, b) => {
                const sevA = severityOrder[a.severity] ?? 5;
                const sevB = severityOrder[b.severity] ?? 5;
                return sevA - sevB;
            });
            
            if (filtered.length === 0) {
                entityListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>No matching entities</p>
                    </div>
                `;
                return;
            }
            
            entityListEl.innerHTML = filtered.map((entity, idx) => {
                const icon = typeIcons[entity.type] || '📌';
                const severity = entity.severity || 'info';
                const badges = [];
                
                // Type badge
                badges.push(`<span class="badge ${entity.type}">${entity.type}</span>`);
                
                // Additional badges from tags
                (entity.tags || []).forEach(tag => {
                    badges.push(`<span class="badge ${tag.toLowerCase()}">${tag}</span>`);
                });
                
                // Detail items
                const details = entity.details || {};
                const detailItems = Object.entries(details).map(([key, value]) => `
                    <div class="detail-item">
                        <div class="detail-label">${key}</div>
                        <div class="detail-value copyable" onclick="copyToClipboard('${String(value).replace(/'/g, "\\'")}')">
                            ${value}
                        </div>
                    </div>
                `).join('');
                
                return `
                    <div class="entity-card ${severity}" data-idx="${idx}">
                        <div class="entity-header" onclick="toggleExpand(${idx})">
                            <div class="entity-icon">${icon}</div>
                            <div class="entity-main">
                                <div class="entity-title">${entity.name || entity.value}</div>
                                <div class="entity-subtitle">${entity.description || entity.type}</div>
                            </div>
                            <div class="entity-badges">${badges.join('')}</div>
                            <div class="expand-icon">▶</div>
                        </div>
                        <div class="entity-details">
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <div class="detail-label">Value</div>
                                    <div class="detail-value copyable" onclick="copyToClipboard('${entity.value}')">${entity.value}</div>
                                </div>
                                ${detailItems}
                            </div>
                            ${entity.actions ? `
                            <div class="entity-actions">
                                ${entity.actions.map(a => `
                                    <button class="action-btn ${a.primary ? 'primary' : ''}" onclick="handleAction('${a.action}', '${entity.value}')">
                                        ${a.icon || ''} ${a.label}
                                    </button>
                                `).join('')}
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Toggle expand
        window.toggleExpand = (idx) => {
            const card = document.querySelector(`[data-idx="${idx}"]`);
            card.classList.toggle('expanded');
        };
        
        // Copy to clipboard
        window.copyToClipboard = async (text) => {
            try {
                await navigator.clipboard.writeText(text);
                // Visual feedback could be added here
            } catch (err) {
                console.error('Copy failed:', err);
            }
        };
        
        // Handle action buttons
        window.handleAction = (action, value) => {
            console.log('Action:', action, 'Value:', value);
            // Actions will be handled by the host
            app.postMessage({ type: 'action', action, value });
        };
    </script>
</body>
</html>
