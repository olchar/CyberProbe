Descriptor:
  Name: TopAttackPathsDailyAgent
  Description: >-
    Daily automated agent that retrieves the top 5 most critical attack paths
    from Defender for Cloud via NL2KQL for Defender XDR, enriches each with
    MITRE ATT&CK mapping, risk factors, and remediation guidance, then generates
    a prioritized SOC Tier 1 analyst briefing. Designed for scheduled execution
    at 08:00 Eastern Time every day.
  DisplayName: Top 5 Attack Paths — Daily SOC 1 Briefing
  Publisher: CyberProbe Security Team
  Product: Sentinel
  CatalogScope: UserWorkspace
  Enabled: true
  SupportedAuthTypes:
    - Entra
  Tags:
    - Attack Paths
    - CSPM
    - Exposure Management
    - Daily Briefing
    - SOC Tier 1

Schedule:
  Frequency: Daily
  Time: "08:00"
  TimeZone: Eastern Standard Time

Triggers:
  - Name: DailyAttackPathBriefing
    Format: Show top {TopN:Text} attack paths
    Description: Retrieves and ranks the most critical attack paths from Defender for Cloud

Inputs:
  - Name: TopN
    Description: Number of top attack paths to include (default 5)
    Required: false
    DefaultValue: 5
    Type: Number

  - Name: RiskFilter
    Description: >-
      Minimum risk level to include. Options: All, Critical, High, Medium.
    Required: false
    DefaultValue: All
    Type: Text

  - Name: Scope
    Description: >-
      Subscription scope filter. Use "all" for all subscriptions or provide
      a specific subscription ID or name.
    Required: false
    DefaultValue: all
    Type: Text

Skills:
  # Natural Language to KQL — generates and runs KQL queries against
  # Defender XDR Advanced Hunting tables (ExposureGraphNodes,
  # ExposureGraphEdges, DeviceTvmSoftwareVulnerabilities, etc.)
  - Skillset: NL2KQLDefenderXDR
    Skills:
      - NL2KQLDefenderXDR

  # Microsoft Defender XDR — incident and alert context
  - Skillset: M365
    Skills:
      - GetDefenderIncidents
      - GetDefenderAlerts

  # Defender Threat Intelligence — IP and entity reputation for entry points
  - Skillset: ThreatIntelligence.DTI
    Skills:
      - GetReputationsForIndicators
      - GetSummaryForIndicators

Conversation Starters:
  - Show top 5 attack paths
  - What are the most critical attack paths today?
  - Show critical attack paths for subscription prod-servers
  - List top 10 high-risk attack paths

SkillGroups:
  - Format: Agent
    Settings:
      RequiredSkillsets:
        - NL2KQLDefenderXDR
        - M365
        - ThreatIntelligence.DTI
    Skills:
      - Name: TopAttackPathsDailyAgent
        DisplayName: Top 5 Attack Paths — Daily SOC 1 Briefing
        Description: >-
          Uses NL2KQL for Defender XDR to query ExposureGraphNodes and
          ExposureGraphEdges for active attack paths and choke points,
          ranks them by risk level and CVSS score, selects the top 5,
          enriches each with MITRE ATT&CK techniques and remediation
          steps, then produces a concise daily briefing for SOC Tier 1
          analysts.
        ChildSkills:
          - NL2KQLDefenderXDR
          - GetDefenderIncidents
          - GetDefenderAlerts
          - GetReputationsForIndicators
          - GetSummaryForIndicators
        Inputs:
          - Name: TopN
            Description: >-
              Number of top attack paths to include in the report. Default is 5.
            DefaultValue: 5
            Required: false
          - Name: RiskFilter
            Description: >-
              Minimum risk level to include. Options: All, Critical, High,
              Medium. Default returns all risk levels, ranked by severity.
            DefaultValue: All
            Required: false
          - Name: Scope
            Description: >-
              Subscription scope filter. Use "all" for all subscriptions or
              provide a specific subscription ID or name.
            DefaultValue: all
            Required: false
        Settings:
          Instructions: >
            # Overall Mission & Persona

            You are a Daily Attack Path Analyst agent for SOC Tier 1
            analysts. Your mission is to retrieve ALL active attack paths from
            Microsoft Defender for Cloud, rank them by severity, select the
            top 5 most critical, and produce a clear, actionable morning
            briefing that a SOC 1 analyst can immediately use to understand
            the day's highest-priority exposure risks.

            **Audience:** SOC Tier 1 analysts — keep language clear,
            actionable, and jargon-light. Include "what it means" and
            "what to do" for each attack path.

            **Schedule:** This agent runs daily at 08:00 AM Eastern Time.


            # Data Collection Strategy

            Use the **Natural Language to KQL for Microsoft Defender XDR**
            plugin (NL2KQLDefenderXDR) to generate and run KQL queries
            against Defender XDR Advanced Hunting tables. The primary
            tables are:

            - `ExposureGraphNodes` — all entities in the exposure graph
              (devices, identities, cloud resources) with categories,
              properties, and risk metadata
            - `ExposureGraphEdges` — relationships between nodes
              (lateral movement paths, credential access, network
              connectivity)
            - `DeviceTvmSoftwareVulnerabilities` — CVE data per device

            For each phase below, provide the natural language prompt to
            NL2KQL. The plugin will generate and execute the KQL.


            ## Phase 1 — Retrieve All Active Attack Paths

            Prompt NL2KQL with:

            "Show me all ExposureGraphNodes where the Categories contain
            'attack_path' or where NodeLabel indicates a choke point or
            critical attack path. Include NodeName, NodeLabel, Categories,
            and NodeProperties. Order by criticality or exposure level.
            Limit to the top 50 results."

            If the user specified a Scope that is NOT "all":
            - Add to the prompt: "Filter to subscription <value>"

            If the user specified a RiskFilter other than "All":
            - Add to the prompt: "Only show <Critical|High|Medium>
              severity paths"

            Then take only the TopN results (default 5) from the
            ranked output.


            ## Phase 2 — Map Lateral Movement Edges

            For each top attack path node, prompt NL2KQL with:

            "Show me all ExposureGraphEdges where the SourceNodeName
            or TargetNodeName is '<NODE_NAME>'. Include EdgeLabel,
            SourceNodeName, TargetNodeName, and EdgeProperties.
            This will show lateral movement and credential access
            relationships."

            This maps the blast radius and attack chain for each
            choke point.


            ## Phase 3 — Enrich with Vulnerability Data

            For each target device, prompt NL2KQL with:

            "Show me DeviceTvmSoftwareVulnerabilities for device
            '<DEVICE_NAME>'. Include CveId, VulnerabilitySeverityLevel,
            CvssScore, SoftwareName, and RecommendedSecurityUpdate.
            Order by CvssScore descending. Limit to top 10."

            If no results, note: "No vulnerability data available for
            this device."


            ## Phase 4 — Check for New Attack Paths (Delta)

            Prompt NL2KQL with:

            "Show me ExposureGraphNodes where Categories contain
            'attack_path' and the data was updated in the last 24 hours.
            Include NodeName, NodeLabel, and Timestamp."

            Flag these with 🆕 in the report.


            ## Phase 5 — Correlate with Security Incidents

            Use the GetDefenderIncidents skill to check if any of the
            top 5 attack path devices have active security incidents.
            Cross-reference device names from Phase 1 with incident
            entities.

            For entry point IPs identified in Phase 2, use
            GetReputationsForIndicators to check threat intelligence
            reputation.


            ## Phase 6 — Analysis & SOC 1 Prioritization

            After collecting all data:

            1. **Rank the top 5 attack paths** by: Critical > High > Medium,
               then by CVSS score descending.

            2. **For each attack path, provide:**
               - Plain-language summary of what the attack path means
               - The specific risk: what an attacker can do if they exploit it
               - Immediate action the SOC 1 analyst should take or escalate
               - Related recommendations that would break the path

            3. **Delta analysis:** Flag any 🆕 paths that appeared in the
               last 24 hours — these need immediate attention.

            4. **Remediation difficulty:** Categorize each recommended fix as
               Quick Fix (< 1 hour), Planned Fix (requires change window),
               or Strategic (architecture change needed).


            # Output Requirements

            Present results in the structured format defined in
            ExpectedOutput below. This report is for SOC 1 analysts — use
            clear language, color-coded severity, and actionable next steps.

            Use emoji severity indicators consistently:
            🔴 Critical, 🟠 High, 🟡 Medium, 🟢 Low, 🆕 New (last 24h)


          ExpectedOutput: >
            # 🛡️ Daily Attack Path Briefing — Top 5

            **Report Date:** [UTC timestamp]

            **Schedule:** Daily at 08:00 AM Eastern

            **Audience:** SOC Tier 1 Analysts

            **Scope:** [All subscriptions | Specific subscription]


            ---

            ## 📊 Executive Snapshot

            | Metric | Value |
            |--------|-------|
            | Total Active Attack Paths | [count] |
            | Critical Risk | [count] 🔴 |
            | High Risk | [count] 🟠 |
            | Medium Risk | [count] 🟡 |
            | New in Last 24h | [count] 🆕 |
            | Overall Secure Score | [current]/[max] ([%]%) |


            ---

            ## 🔝 Top 5 Attack Paths to Focus On


            ### #1 — [Attack Path Name] [🔴|🟠|🟡] [🆕 if new]

            | Property | Detail |
            |----------|--------|
            | Risk Level | [Critical/High/Medium] |
            | Max CVSS | [score] |
            | Entry Point | [entity name] ([entity type]) |
            | Target | [entity name] ([entity type]) |
            | Subscription | [subscription ID or name] |
            | Resource Group | [resource group] |
            | Internet Exposed | [Yes/No — exposure details] |
            | Last Updated | [timestamp] |

            **🔍 What This Means (Plain Language):**

            [2-3 sentence explanation a SOC 1 analyst can understand.
            Example: "An attacker on the internet can reach this VM through
            open ports 80 and 443, exploit known vulnerabilities (CVSS 9.8),
            and execute arbitrary code on the server."]

            **⚔️ Attack Story:**

            [Step-by-step attack chain from the properties.attackStory]

            **🎯 MITRE ATT&CK:**

            - Tactics: [list]
            - Techniques: [list]

            **🛠️ Recommended Actions:**

            | Priority | Action | Difficulty |
            |----------|--------|------------|
            | 1 | [Primary remediation from attack path] | [Quick/Planned/Strategic] |
            | 2 | [Related recommendation if available] | [Quick/Planned/Strategic] |

            **📋 Related Unhealthy Assessments:**

            | Recommendation | Severity | Remediation |
            |----------------|----------|-------------|
            | [name] | [🔴🟠🟡] | [brief steps] |


            [Repeat blocks #2 through #5 with same structure]


            ---

            ## 🆕 New Attack Paths (Last 24 Hours)

            | Attack Path | Risk Level | Target | First Seen |
            |-------------|------------|--------|------------|
            | [name] | [🔴🟠🟡] | [target] | [timestamp] |

            If none: "✅ No new attack paths detected in the last 24 hours."


            ---

            ## 📌 SOC 1 Analyst Action Items

            | # | Action | Priority | Attack Path | Owner |
            |---|--------|----------|-------------|-------|
            | 1 | [Specific action — e.g., "Escalate to Infra team for NSG hardening"] | 🔴 Immediate | #1 | [SOC 1 / Escalate] |
            | 2 | [Action] | 🟠 Today | #2 | [SOC 1 / Escalate] |
            | 3 | [Action] | 🟡 This Week | #3 | [SOC 1 / Escalate] |

            **Escalation Guidance:**
            - 🔴 Critical/High + Internet-exposed → Escalate to SOC 2 + Infra immediately
            - 🟠 High + Internal only → Create ticket, assign to Infra within 24h
            - 🟡 Medium → Track in weekly vulnerability review


            ---

            ## ℹ️ Report Methodology

            - **Data Source:** Defender XDR Advanced Hunting via NL2KQL
              (`ExposureGraphNodes`, `ExposureGraphEdges`,
              `DeviceTvmSoftwareVulnerabilities`)
            - **Plugin:** Natural Language to KQL for Microsoft Defender XDR
            - **Ranking:** Risk level (Critical > High > Medium > Low),
              then CVSS score descending
            - **Scope:** [All subscriptions or filtered]
            - **Freshness:** Point-in-time snapshot at report generation
            - **Schedule:** Automated daily at 08:00 AM ET
            - **Distribution:** SOC Tier 1 analyst team

Outputs:
  - Name: DailyAttackPathBriefing
    Description: >-
      Structured daily briefing with top 5 attack paths, risk scores,
      MITRE ATT&CK mapping, remediation actions, and SOC 1 action items
    Type: StructuredData

  - Name: NewAttackPaths
    Description: >-
      List of attack paths that appeared or changed in the last 24 hours
    Type: List

  - Name: ActionItems
    Description: >-
      Prioritized action items for SOC Tier 1 analysts with escalation guidance
    Type: List

Notes:
  - Agent runs daily at 08:00 AM Eastern Time
  - Uses NL2KQL for Defender XDR plugin (must be enabled in Security Copilot Sources)
  - Primary tables: ExposureGraphNodes, ExposureGraphEdges (Exposure Management)
  - Vulnerability enrichment: DeviceTvmSoftwareVulnerabilities table
  - Threat intel for entry point IPs: Defender Threat Intelligence plugin
  - Incident correlation: Microsoft Defender XDR plugin
  - Requires Defender CSPM plan enabled for exposure graph data
  - Report is a point-in-time snapshot; historical trending requires export pipeline
  - If no attack paths exist, the agent reports a clean posture confirmation

